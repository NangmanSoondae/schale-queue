# ============================================================================
#  Schale Queue - module-worker 설정
#  ----------------------------------------------------------------------------
#  [보안 원칙 — docs/5_code_of_conduct.md §5.3.2]
#   · 이 파일에는 '구조와 플레이스홀더'만 둔다. 실제 민감 값은 절대 작성하지 않는다.
#
#  워커는 웹 계층이 없는 백그라운드 모듈이다(web-application-type=none).
#  대기열 소비(Redis)에 더해, 결제 만료 정리(UC-07)가 DB(JPA)를 쓰므로 datasource 를 되살렸다
#  (2026-06-26, SchaleQueueWorkerApplication 참조). 민감 값은 .env / 환경변수로 주입.
# ============================================================================
spring:
  application:
    name: schale-queue-worker

  # 웹 서버 없이 백그라운드로만 기동. Virtual Threads 활성 시 스케줄러 스레드가 데몬이라
  # JVM 이 곧장 종료되므로, keep-alive 로 비데몬 유지 스레드를 띄워 프로세스를 살린다(Boot 3.2+).
  main:
    web-application-type: none
    keep-alive: true

  # 종료 시 진행 중인 리스너/스케줄러 작업(아웃박스 릴레이 배치, 결제 만료 정리)이 마무리될 시간을 준다.
  # compose 의 stop_grace_period(30s)보다 짧게 잡아 SIGKILL 전에 정상 종료가 끝나게 한다.
  lifecycle:
    timeout-per-shutdown-phase: 20s

  # Java 21 Virtual Threads 활성화 (docs/2_architecture.md 전략 1)
  threads:
    virtual:
      enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # 후방 이벤트 발행/구독(ADR-002, UC-08 / ADR-007 아웃박스). 워커가 발행(릴레이)과 구독(알림)을 모두 담당한다.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    # 발행: 아웃박스 릴레이가 직렬화된 JSON 문자열(payload)을 그대로 보낸다(범용 — 타입 비의존).
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all              # 무유실: 리더+ISR 복제 ack 까지 확인(릴레이 send().get() 과 함께 at-least-once)
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # 역직렬화 실패(포이즌 필)를 예외가 아닌 '실패 레코드'로 리스너 컨테이너에 넘긴다.
      # 맨 JsonDeserializer 는 poll() 내부에서 터져 같은 오프셋을 무한 재폴링(파티션 영구 정지)하므로
      # ErrorHandlingDeserializer 로 감싸 에러 핸들러(KafkaConsumerConfig → DLT)가 처리하게 한다.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      # earliest: 신규 컨슈머 그룹(또는 오프셋 만료)이 그룹 조인 전에 발행된 이벤트를 건너뛰지 않게 한다.
      # (#21 정산 그룹 추가 때 latest 로 인해 기존 이벤트가 스킵되는 시나리오를 실제로 겪음.)
      # 모든 컨슈머가 processed_event 멱등 가드를 갖춰 과거 이벤트 재소비도 안전하다(ADR-007).
      auto-offset-reset: earliest
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.schale.queue.*"
        spring.json.use.type.headers: false   # 릴레이가 보낸 raw JSON 엔 타입 헤더가 없음
        # 역직렬화 대상 타입은 토픽마다 달라(주문완료/취소) 리스너별 @KafkaListener(properties=...)로 지정한다.

  # 결제 만료 정리(UC-07)용 DB. api 와 동일 스키마에 접속한다(민감 값은 외부 주입).
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/schale_queue}
    username: ${DB_USERNAME:schale}
    password: ${DB_PASSWORD}            # 기본값 없음 → 반드시 외부 주입 (.env / secret)
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate                # DDL 은 Flyway 관리(ADR-008), Hibernate 는 엔티티-스키마 검증만
    open-in-view: false

  # DB 스키마 마이그레이션(ADR-008). api 와 같은 DB — Flyway 잠금으로 동시 적용도 안전(먼저 잡은 쪽만).
  flyway:
    baseline-on-migrate: true           # 이력 테이블 없는 기존 DB 는 V1 로 baseline 후 이후 버전만 적용(No.09 흡수)

# 대기열 소비(P-Q4 입장률 throttle) — rate ≈ batch-size ÷ interval 을 DB 보호 상한(S3) 이하로 유지
schale:
  queue:
    consumer:
      interval: 200ms       # dequeue 주기 (@Scheduled fixedDelay)
      batch-size: 50        # tick·상품당 최대 입장 인원 (기본값 ≈ 상품당 250 TPS)
  payment:
    expiry-interval: 10s    # 결제 만료 정리 주기 (@Scheduled fixedDelay, UC-07)
  outbox:
    relay-interval: 500ms   # 아웃박스 PENDING 폴링→Kafka 발행 주기 (@Scheduled fixedDelay, ADR-007)
