# ============================================================================
#  Schale Queue - module-api 설정
#  ----------------------------------------------------------------------------
#  [보안 원칙 — docs/5_code_of_conduct.md §5.3.2]
#   · 이 파일에는 '구조와 플레이스홀더'만 둔다. 실제 민감 값은 절대 작성하지 않는다.
#   · 민감 값(특히 DB_PASSWORD)은 .env 또는 application-secret.yml 로 분리 (gitignore 대상).
#   · ${VAR:default} 형식에서 default 가 없는 값은 환경변수 주입이 필수다.
# ============================================================================
spring:
  application:
    name: schale-queue-api

  # Java 21 Virtual Threads 활성화 (docs/2_architecture.md 전략 1)
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/schale_queue}
    username: ${DB_USERNAME:schale}
    password: ${DB_PASSWORD}            # 기본값 없음 → 반드시 외부 주입 (.env / secret)
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate                # DDL 은 schema.sql 로 관리, 엔티티-스키마 검증만 수행
    open-in-view: false                 # OSIV 비활성 — 영속성 컨텍스트 수명 제어
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # (ADR-007) 이벤트 발행은 워커 아웃박스 릴레이로 이전. api 는 confirm() 트랜잭션에서 event_outbox 행만
  # 남기므로 Kafka producer 설정이 필요 없다(api 는 Kafka 비의존). 실제 발행 설정은 module-worker 에 있다.

server:
  port: ${SERVER_PORT:8080}

# 관측성(§9.3.6). 부하 중 JVM 스레드/메모리 계측용으로 metrics 엔드포인트만 노출(로컬 한정).
management:
  endpoints:
    web:
      exposure:
        include: health,metrics

# 대기열 SSE 스트림 파라미터 (api 전용, QueueSseProperties). 기본값과 동일 — 운영 시 재정의용 노출.
schale:
  queue:
    sse:
      poll-interval: ${QUEUE_SSE_POLL_INTERVAL:1s}      # 순번/입장 폴링 주기
      emitter-timeout: ${QUEUE_SSE_EMITTER_TIMEOUT:30m} # SSE 연결 타임아웃
