# ============================================================================
#  Schale Queue - 로컬 개발 인프라 (Docker Compose)
#  ----------------------------------------------------------------------------
#  - 계정/DB 정보는 .env 파일의 변수를 참조한다. (docs/5_code_of_conduct.md §5.3.2)
#    → 실행 전 `cp .env.example .env` 후 실제 값을 채울 것.
#  - MariaDB: 스키마는 앱 부팅 시 Flyway 가 db/migration/V*.sql 로 적용한다(ADR-008).
#    (과거 schema.sql initdb 마운트는 최초 1회만 실행돼 드리프트를 유발 → 제거, troubleshooting No.09)
#  - Redis  : AOF 영속화 + 로컬 볼륨으로 데이터 보존.
#  실행: docker-compose up -d   /   종료: docker-compose down
# ============================================================================

services:
  mariadb:
    image: mariadb:10.6
    container_name: schale-mariadb
    restart: unless-stopped
    mem_limit: 768m          # per-container 상한(No.07): 단일 컨테이너가 Docker VM 전체 메모리를 굶기지 못하게 격리
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      # 데이터 영속화 (스키마는 Flyway 가 앱 부팅 시 적용 — initdb 마운트 제거, ADR-008)
      - schale-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: schale-redis
    restart: unless-stopped
    mem_limit: 256m          # per-container 상한(No.07)
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]   # AOF 영속화 활성
    volumes:
      - schale-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 후방 이벤트 파이프라인(ADR-002 §2). KRaft 단일노드(주키퍼 없이 브로커 혼자) — 로컬 최소 구성.
  # 호스트에서 실행되는 앱은 localhost:9092 로 접속한다(KAFKA_ADVERTISED_LISTENERS).
  kafka:
    image: apache/kafka:3.9.0
    container_name: schale-kafka
    restart: unless-stopped
    mem_limit: 1536m         # per-container 상한(No.07): JVM 힙(아래)+페이지캐시 여유 포함. VM 굶김 방지
    ports:
      - "9092:9092"
    environment:
      # JVM 힙 상한 고정(No.07): 미지정 시 Kafka 기본(~1G)이지만 명시해 예측 가능하게 못박는다.
      # 로컬 단일노드·소량 토픽엔 충분. 무제한 힙이 Docker Desktop VM 을 굶겨 크래시시키던 벡터를 제거.
      KAFKA_HEAP_OPTS: "-Xmx768m -Xms256m"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # 듀얼 리스너(Phase 5): 호스트(bootRun/부하툴)는 PLAINTEXT(localhost:9092),
      # compose 네트워크 내부 컨테이너(api/worker)는 INTERNAL(kafka:29092)로 같은 브로커에 접속한다.
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"     # order.completed 토픽 자동 생성
    volumes:
      - schale-kafka-data:/var/lib/kafka/data
    healthcheck:
      # kafka-topics.sh 는 매 호출마다 JVM 을 풀 기동한다(수백 MB 순간 스파이크). 10s→30s 로 늦추고
      # start_period 로 부팅 유예를 둬 반복 JVM 기동의 메모리 압박을 줄인다(No.07).
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ==========================================================================
  #  애플리케이션 (Phase 5 통합 배포) — profile 'app' 으로 분리.
  #   · 기본 `docker compose up`        → 인프라(mariadb/redis/kafka)만 (bootRun 개발 흐름 보존)
  #   · `docker compose --profile app up --build` → 위 인프라 + api + worker 풀스택
  #   · 컨테이너 앱은 service 명으로 인프라에 접속(localhost 아님): mariadb / redis / kafka:29092
  #   · 시크릿(DB_PASSWORD 등)은 .env 로만 주입(§5.3.2). 이미지에 굽지 않는다.
  # ==========================================================================
  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: backend/module-api/Dockerfile
    container_name: schale-api
    restart: unless-stopped
    mem_limit: 768m          # per-container 상한(No.07 일관성)
    ports:
      # 호스트:컨테이너. 컨테이너 내부는 항상 8080. 호스트 포트는 API_PORT 로 오버라이드 가능
      # (예: 8080 을 다른 서비스 — notify-gateway 등 — 가 점유 중이면 .env 에 API_PORT=8081).
      - "${API_PORT:-8080}:8080"
    environment:
      DB_URL: jdbc:mariadb://mariadb:3306/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080      # 컨테이너 내부 리슨 포트(고정). 호스트 노출은 위 API_PORT 가 결정
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # api 는 actuator health 를 노출(application.yml). JRE 이미지엔 curl 이 없어 JVM 내장 수단 대신
      # busybox wget 도 없으므로, bash /dev/tcp 로 포트 개방을 확인한다(경량·의존성 0).
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo ok >&3 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: backend/module-worker/Dockerfile
    container_name: schale-worker
    restart: unless-stopped
    mem_limit: 768m          # per-container 상한(No.07 일관성)
    environment:
      DB_URL: jdbc:mariadb://mariadb:3306/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP: kafka:29092      # 컨테이너 내부는 INTERNAL 리스너로 접속
      # 알림 게이트웨이/웹훅은 선택값(미설정 시 워커가 발송 건너뜀, NotifyGatewayClient). .env 가 있으면 전달된다.
      NOTIFY_GATEWAY_URL: ${NOTIFY_GATEWAY_URL:-}
      NOTIFY_GATEWAY_API_KEY: ${NOTIFY_GATEWAY_API_KEY:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  schale-mariadb-data:
  schale-redis-data:
  schale-kafka-data:
