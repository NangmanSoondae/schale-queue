# ============================================================================
#  Schale Queue - 로컬 개발 인프라 (Docker Compose)
#  ----------------------------------------------------------------------------
#  - 계정/DB 정보는 .env 파일의 변수를 참조한다. (docs/5_code_of_conduct.md §5.3.2)
#    → 실행 전 `cp .env.example .env` 후 실제 값을 채울 것.
#  - MariaDB: 컨테이너 최초 기동 시 schema.sql 을 자동 실행하여 테이블 생성.
#  - Redis  : AOF 영속화 + 로컬 볼륨으로 데이터 보존.
#  실행: docker-compose up -d   /   종료: docker-compose down
# ============================================================================

services:
  mariadb:
    image: mariadb:10.6
    container_name: schale-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      # 데이터 영속화
      - schale-mariadb-data:/var/lib/mysql
      # 최초 기동 시 자동 실행: schema.sql → 테이블 생성 (읽기 전용 마운트)
      - ./backend/module-core/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: schale-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]   # AOF 영속화 활성
    volumes:
      - schale-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 후방 이벤트 파이프라인(ADR-002 §2). KRaft 단일노드(주키퍼 없이 브로커 혼자) — 로컬 최소 구성.
  # 호스트에서 실행되는 앱은 localhost:9092 로 접속한다(KAFKA_ADVERTISED_LISTENERS).
  kafka:
    image: apache/kafka:3.9.0
    container_name: schale-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"     # order.completed 토픽 자동 생성
    volumes:
      - schale-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  schale-mariadb-data:
  schale-redis-data:
  schale-kafka-data:
