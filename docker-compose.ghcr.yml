# ============================================================================
#  GHCR 발행 이미지 오버라이드 (v2-a) — 소스 빌드 없이 풀스택 실행
#  ----------------------------------------------------------------------------
#  기본 docker-compose.yml 은 로컬 소스를 빌드한다. 이 파일을 겹치면 세 앱 서비스가
#  GitHub Container Registry 의 발행 이미지를 사용한다 (인프라 3종은 원래 공개 이미지).
#
#  사용법:
#    cp .env.example .env    # 값 채우기
#    docker compose -f docker-compose.yml -f docker-compose.ghcr.yml --profile app pull
#    docker compose -f docker-compose.yml -f docker-compose.ghcr.yml --profile app up -d --no-build
#
#  버전 고정: IMAGE_TAG=1.0.0 (미설정 시 latest)
# ============================================================================

services:
  api:
    image: ghcr.io/nangmansoondae/schale-queue-api:${IMAGE_TAG:-latest}

  worker:
    image: ghcr.io/nangmansoondae/schale-queue-worker:${IMAGE_TAG:-latest}

  frontend:
    image: ghcr.io/nangmansoondae/schale-queue-frontend:${IMAGE_TAG:-latest}
