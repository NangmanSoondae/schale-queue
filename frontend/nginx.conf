# ============================================================================
#  Schale Queue frontend — nginx 서버 블록
#  ----------------------------------------------------------------------------
#  /api  → api 컨테이너(service 명 api:8080) 리버스 프록시. SSE(text/event-stream)가
#          지나가므로 버퍼링을 꺼서 이벤트가 즉시 흘러가게 한다(버퍼링이 켜져 있으면
#          nginx 가 응답을 모아 보내 순번 갱신이 오지 않는다).
#  그 외  → SPA 정적 서빙. 클라이언트 라우팅(/goods/1/queue 새로고침 등)은 전부
#          index.html 로 폴백한다.
# ============================================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 텍스트 자산 압축(해시된 번들 js/css 전송량 절감).
    # text/javascript 병기(리뷰2 L-3): nginx 1.27.4+ 는 mime.types 의 .js 를 text/javascript 로
    # 바꿔, application/javascript 만 나열하면 플로팅 태그 업데이트 시 조용히 압축이 꺼진다.
    gzip on;
    gzip_types text/css application/javascript text/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;             # SSE 장기 연결에 keep-alive 필요
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";     # 업스트림으로 close 를 전파하지 않는다
        proxy_buffering off;                # SSE 이벤트 즉시 전달(핵심)
        proxy_cache off;
        proxy_read_timeout 1h;              # SSE 보유 시간 > 서버 emitter 타임아웃
    }

    # Vite 가 해시를 박은 불변 번들은 장기 캐시
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;   # SPA 라우팅 폴백
        add_header Cache-Control "no-cache"; # index.html 은 배포 즉시 갱신
    }
}
